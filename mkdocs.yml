# 對外網站僅發布 docs 根目錄之對外頁面；不納入 docs/internal、docs/internal_docs。
# 若 MkDocs 版本支援，可設定 exclude_docs 或僅在 nav 列出對外頁面，避免內部路徑被建置。
site_name: 立國工程管理系統
site_url: https://SLchinwen.github.io/PJ-Likuo-DB

# 指定文件來源目錄（指向專案內的 docs）
docs_dir: projects/LIKUO_DB/docs

nav:
  - 1. 首頁: index.md
  - 2. 系統範圍與規劃: scope.md
  - 3. 功能與雛型預覽: features.md
  - 4. 操作手冊:
      - 4-1. 總覽: guides/index.md
      - 4-2. 第一階段操作手冊（MCR）: guides/mcr_phase1.md
      - 4-3. MCR310 客戶合約工作項目建檔: guides/prototype_MCR310.md
      - 4-4. MCR320 客戶設備工作項目建檔: guides/prototype_MCR320.md
  - 5. 版本與更新紀錄: changelog.md

theme:
  name: material            # 使用最美的 Material 主題
  language: zh-TW           # 繁體中文介面
  features:
    - navigation.expand     # 左側選單預設展開
    - navigation.top        # 回到頂部按鈕
  palette:
    primary: teal           # 主色調 (可改)

extra_css:
  - stylesheets/extra.css

copyright: Made with Material for MkDocs

markdown_extensions:
  - pymdownx.superfences:   # 這是支援 Mermaid 的關鍵擴充
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search                  # 搜尋功能
